<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main logo gradient -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Orbit gradient -->
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.2" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00f5ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle for better visibility -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Outer orbit ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#orbitGradient)" stroke-width="2" opacity="0.6">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Orbiting particle -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
    <circle cx="100" cy="20" r="4" fill="#ffff00" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Secondary orbiting particles -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="120 100 100" to="480 100 100" dur="12s" repeatCount="indefinite"/>
    <circle cx="100" cy="35" r="2" fill="#00f5ff" opacity="0.8"/>
  </g>
  
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="240 100 100" to="600 100 100" dur="10s" repeatCount="indefinite"/>
    <circle cx="100" cy="30" r="2" fill="#ff00ff" opacity="0.6"/>
  </g>
  
  <!-- Main logo container -->
  <rect x="40" y="40" width="120" height="120" rx="30" ry="30" fill="url(#logoGradient)" filter="url(#dropshadow)">
    <animateTransform attributeName="transform" attributeType="XML" type="scale" values="1;1.02;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Letter N -->
  <g fill="white" filter="url(#glow)">
    <!-- Left vertical line -->
    <rect x="65" y="70" width="12" height="60" rx="2"/>
    <!-- Right vertical line -->
    <rect x="123" y="70" width="12" height="60" rx="2"/>
    <!-- Diagonal line -->
    <rect x="77" y="88" width="46" height="8" rx="2" transform="rotate(33 100 92)"/>
  </g>
  
  <!-- Inner glow effect -->
  <rect x="40" y="40" width="120" height="120" rx="30" ry="30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>